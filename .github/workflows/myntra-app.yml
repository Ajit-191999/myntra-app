name: Myntra CI/CD

on: workflow_dispatch

jobs:

  build:

    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Build Docker Image
        run: |
          docker build -t myntra-app .

      - name: Stop Old Container
        run: |
          docker stop myntra-app || true
          docker rm myntra-app || true

      - name: Run Container
        run: |
          docker run -d \
          --name myntra-app \
          -p 80:3000 \
          myntra-app