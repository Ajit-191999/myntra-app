name: Myntra CI/CD

on: workflow_dispatch

jobs:

  build:

    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Debug Project Structure
        run: |
          echo "Current directory:"
          pwd

          echo "Repository files:"
          find . -maxdepth 2 -type f | sort

          echo ""
          echo "Public folder:"
          ls -la public

          echo ""
          echo "Source folder:"
          ls -la src

      - name: Build Docker Image
        run: docker build -t myntra-app .

      - name: Stop Old Container
        run: |
          docker stop myntra-app || true
          docker rm myntra-app || true

      - name: Run Container
        run: |
          docker run -d \
          --name myntra-app \
          -p 80:3000 \
          myntra-app